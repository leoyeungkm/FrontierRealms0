<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEZ 戰士技能 — 體素角色版</title>
<style>
  :root{--steel:#c9d6e3;--gold:#ffcf6b;--cyan:#5fd0ff;--ink:#0a0e16;
    --panel:rgba(14,20,32,.85);--line:rgba(140,170,210,.22)}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink);
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:#e7eef7}
  #app{position:fixed;inset:0}canvas{display:block}
  #panel{position:fixed;top:14px;left:14px;width:254px;max-height:calc(100vh - 28px);
    overflow-y:auto;background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 10px 40px rgba(0,0,0,.55)}
  #panel h1{font-size:14px;letter-spacing:.05em;color:var(--gold);text-shadow:0 0 12px rgba(255,207,107,.4);margin-bottom:2px}
  .sub{font-size:11px;color:#8fa6c0;margin-bottom:11px}
  .group{margin-bottom:10px}
  .lbl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;margin:0 0 6px 2px;font-weight:700;display:flex;align-items:center;gap:6px}
  .lbl .dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 8px currentColor}
  .btn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;
    background:rgba(40,54,78,.5);border:1px solid var(--line);color:#dce8f5;
    padding:6px 9px;border-radius:8px;font-size:12px;cursor:pointer;margin-bottom:4px;transition:.12s;font-family:inherit}
  .btn:hover{background:rgba(64,86,124,.7);transform:translateX(2px)}
  .btn .ico{font-size:14px;width:16px;text-align:center}
  .btn .meta{margin-left:auto;font-size:9px;color:#7f99b8}
  .tag-stun{color:var(--gold)}.tag-kb{color:var(--cyan)}.tag-fl{color:#b9c8da}
  .btn-reset{justify-content:center;background:rgba(120,60,60,.45);border-color:rgba(220,140,140,.4)}
  .btn-reset:hover{background:rgba(150,72,72,.65)}
  #lvrow{display:flex;gap:5px;margin:2px 0 12px}
  #lvrow button{flex:1;background:rgba(40,54,78,.5);border:1px solid var(--line);
    color:#cfe0f2;border-radius:6px;padding:5px 0;font-size:11px;cursor:pointer;font-family:inherit}
  #lvrow button.on{background:linear-gradient(180deg,#3a6fb0,#27508a);border-color:#6ba2dd;color:#fff}
  .tog{display:flex;align-items:center;justify-content:space-between;background:rgba(40,54,78,.4);
    border:1px solid var(--line);border-radius:7px;padding:6px 9px;margin-bottom:4px;font-size:11.5px;cursor:pointer}
  .tog .sw{width:34px;height:18px;border-radius:9px;background:#33405a;position:relative;transition:.15s}
  .tog .sw::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#8295ad;transition:.15s}
  .tog.on .sw{background:linear-gradient(90deg,#2f8fd0,#27c0a8)}
  .tog.on .sw::after{left:18px;background:#fff}
  .row{display:flex;align-items:center;gap:8px;font-size:11px;color:#9fb6d0;margin:5px 2px}.row input{flex:1}
  #now{position:fixed;top:18px;right:18px;text-align:right;pointer-events:none}
  #now .nm{font-size:22px;font-weight:700;color:#fff;text-shadow:0 0 16px rgba(120,180,255,.6)}
  #now .ph{font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-top:2px}
  .ph-windup{color:var(--gold)}.ph-active{color:var(--cyan)}.ph-recovery{color:#7f99b8}
  #hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:var(--panel);
    border:1px solid var(--line);border-radius:9px;padding:7px 15px;font-size:11.5px;color:#9fb6d0;backdrop-filter:blur(8px)}
  #hint b{color:var(--steel)}
</style>
</head>
<body>
<div id="app"></div>
<div id="panel">
  <h1>⚔ FEZ 技能特效 · 動作版</h1>
  <div class="sub">手臂關節動畫 · 三系武器</div>
  <div class="group">
    <button class="btn btn-reset" id="btn-reset">↻ 重置敵人位置</button>
    <button class="btn" id="btn-idle" style="justify-content:center;background:rgba(60,100,120,.45);border-color:rgba(120,200,230,.4)">🧍 待機姿勢(idle)</button>
    <div class="tog on" id="tog-bloom"><span>Bloom 光暈</span><span class="sw"></span></div>
    <div class="tog on" id="tog-flip"><span>Flipbook 序列幀</span><span class="sw"></span></div>
    <div class="row"><span>光暈</span><input type="range" id="sl-bloom" min="0" max="150" value="65"></div>
    <div class="row"><span>曝光</span><input type="range" id="sl-exp" min="60" max="160" value="100"></div>
  </div>
  <div id="lvrow"><button data-lv="0">Lv1</button><button data-lv="1">Lv2</button><button data-lv="2" class="on">Lv3</button></div>
  <div class="group" id="g-common"><div class="lbl" style="color:#ffcf6b"><span class="dot"></span>共通</div></div>
  <div class="group" id="g-sword_shield"><div class="lbl" style="color:#7fc8ff"><span class="dot"></span>單手劍盾</div></div>
  <div class="group" id="g-greatsword"><div class="lbl" style="color:#ffa336"><span class="dot"></span>雙手劍</div></div>
  <div class="group" id="g-polearm"><div class="lbl" style="color:#66e6a6"><span class="dot"></span>長槍</div></div>
</div>
<div id="now"><div class="nm">—</div><div class="ph"></div></div>
<div id="hint">點技能 · <b>拖曳</b>轉視角 · <b>滾輪</b>縮放 · 武器與動作會跟技能切換</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const SKILL_DEFS={
  embolden:{nameZh:'堅毅',icon:'✨',weapon:'common',windup:.2,kind:'buff'},
  reinforce_guard:{nameZh:'強化防禦',icon:'🛡',weapon:'common',windup:.3,kind:'buff'},
  tackle:{nameZh:'衝撞',icon:'⚡',weapon:'common',windup:.1,kind:'dash',
    lv:[{range:5,hitstun:'knockback'},{range:7,hitstun:'knockback'},{range:8,hitstun:'knockback'}]},
  shield_bash:{nameZh:'盾擊',icon:'🛡',weapon:'sword_shield',windup:.25,kind:'cone',swing:'bash',
    lv:[{range:2,halfAngleCos:.707,hitstun:'stun'},{range:2,halfAngleCos:.707,hitstun:'stun'},{range:2,halfAngleCos:.707,hitstun:'stun'}]},
  smash:{nameZh:'重擊',icon:'💥',weapon:'sword_shield',windup:.12,kind:'cone',
    lv:[{range:2,halfAngleCos:.866,hitstun:'flinch'},{range:2,halfAngleCos:.866,hitstun:'flinch'},{range:2,halfAngleCos:.866,hitstun:'flinch'}]},
  smash_2:{nameZh:'連續重擊',icon:'💢',weapon:'sword_shield',windup:.12,kind:'cone',hits:2,
    lv:[{range:2,halfAngleCos:.866,hitstun:'flinch'},{range:2,halfAngleCos:.866,hitstun:'flinch'},{range:2,halfAngleCos:.866,hitstun:'flinch'}]},
  force_impact:{nameZh:'衝擊波',icon:'🌊',weapon:'sword_shield',windup:.4,kind:'projectile',
    lv:[{range:8,hitstun:'knockback'},{range:10,hitstun:'knockback'},{range:12,hitstun:'knockback'}]},
  sonic_boom:{nameZh:'音速波',icon:'💨',weapon:'sword_shield',windup:.3,kind:'wave',
    lv:[{range:9,aoeWidth:2,hitstun:'flinch'},{range:12,aoeWidth:2,hitstun:'flinch'},{range:15,aoeWidth:2,hitstun:'flinch'}]},
  behemoths_tail:{nameZh:'巨獸尾擊',icon:'🐉',weapon:'greatsword',windup:.35,kind:'cone',hits:4,
    lv:[{range:3,halfAngleCos:0,hitstun:'flinch'},{range:3,halfAngleCos:0,hitstun:'flinch'},{range:3,halfAngleCos:0,hitstun:'flinch'}]},
  heavy_smash:{nameZh:'重型重擊',icon:'⚒',weapon:'greatsword',windup:.3,kind:'cone',
    lv:[{range:3,halfAngleCos:.5,hitstun:'flinch'},{range:3,halfAngleCos:.5,hitstun:'flinch'},{range:3,halfAngleCos:.5,hitstun:'flinch'}]},
  crumble_storm:{nameZh:'碎裂風暴',icon:'🌪',weapon:'greatsword',windup:.5,kind:'self_aoe',
    lv:[{aoeRadius:4,hitstun:'knockback'},{aoeRadius:4,hitstun:'knockback'},{aoeRadius:4,hitstun:'knockback'}]},
  cleave:{nameZh:'劈斬',icon:'⚔',weapon:'greatsword',windup:.4,kind:'cone',
    lv:[{range:3,halfAngleCos:.5,hitstun:'flinch'},{range:3,halfAngleCos:.5,hitstun:'flinch'},{range:3,halfAngleCos:.5,hitstun:'flinch'}]},
  slam_attack:{nameZh:'重墜攻擊',icon:'🔨',weapon:'greatsword',windup:.45,kind:'point_aoe',swing:'chop',
    lv:[{aoeRadius:3,hitstun:'knockback'},{aoeRadius:3,hitstun:'knockback'},{aoeRadius:3,hitstun:'knockback'}]},
  lance_sweep:{nameZh:'長槍橫掃',icon:'🔱',weapon:'polearm',windup:.25,kind:'cone',
    lv:[{range:3.5,halfAngleCos:.5,hitstun:'flinch'},{range:3.5,halfAngleCos:.5,hitstun:'flinch'},{range:3.5,halfAngleCos:.5,hitstun:'flinch'}]},
  lance_charge:{nameZh:'長槍突刺',icon:'🏹',weapon:'polearm',windup:.2,kind:'dash',swing:'thrust',
    lv:[{range:4,hitstun:'flinch'},{range:5,hitstun:'flinch'},{range:6,hitstun:'flinch'}]},
  big_step:{nameZh:'大步突進',icon:'🦘',weapon:'polearm',windup:.3,kind:'dash_aoe',swing:'thrust',
    lv:[{dashRange:3,aoeRadius:2,hitstun:'knockback'},{dashRange:4,aoeRadius:2.5,hitstun:'knockback'},{dashRange:5,aoeRadius:3,hitstun:'knockback'}]},
  whirlwind_lance:{nameZh:'風暴長槍',icon:'🌀',weapon:'polearm',windup:.4,kind:'self_aoe',hits:3,swing:'spin',
    lv:[{aoeRadius:4,hitstun:'flinch'},{aoeRadius:4,hitstun:'flinch'},{aoeRadius:4,hitstun:'flinch'}]},
};
const FX={bloom:true,flip:true};
const FACING=Math.PI;
// 每招專屬動作
const SWING_MAP={
  shield_bash:'bash', smash:'chop_quick', smash_2:'slash2', force_impact:'thrust', sonic_boom:'sweep',
  behemoths_tail:'gs_sweep', heavy_smash:'chop', crumble_storm:'spin', cleave:'diag', slam_attack:'slam',
  lance_sweep:'pl_sweep', lance_charge:'pl_thrust', big_step:'pl_leap', whirlwind_lance:'pl_spin',
  tackle:'shoulder', embolden:'raise', reinforce_guard:'guard',
};
// 這些技能會真正移動到新位置（不彈回）
const RELOCATE=new Set(['cleave','lance_charge','big_step','tackle']);
const SW=.9; // 出招動作總長（放慢）
// 每招「揮到位」的時間點（佔出招比例），特效在此刻才觸發
const IMPACT={slash:.55,slash2:.55,chop_quick:.6,chop:.66,diag:.64,gs_sweep:.5,sweep:.5,
  thrust:.58,leap_thrust:.6,slam:.72,bash:.62,spin:.45,shoulder:.52,
  pl_sweep:.5,pl_thrust:.6,pl_leap:.62,pl_spin:.45,raise:.2,guard:.2};

/* ════════ 場景 ════════ */
const app=document.getElementById('app');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x0f1626);scene.fog=new THREE.Fog(0x0f1626,18,48);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,200);
let camYaw=.5,camPitch=.55,camDist=13;
function updateCam(){camera.position.set(Math.sin(camYaw)*Math.cos(camPitch)*camDist,
  Math.sin(camPitch)*camDist,Math.cos(camYaw)*Math.cos(camPitch)*camDist);camera.lookAt(0,1.2,-1.5);}
updateCam();
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.NoToneMapping;app.appendChild(renderer.domElement);
const sun=new THREE.DirectionalLight(0xffead0,2.1);sun.position.set(8,14,6);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-15;sun.shadow.camera.right=15;
sun.shadow.camera.top=15;sun.shadow.camera.bottom=-15;sun.shadow.bias=-.0004;scene.add(sun);
scene.add(new THREE.HemisphereLight(0x88bbff,0x47502f,.5));
const ground=new THREE.Mesh(new THREE.CircleGeometry(40,48),new THREE.MeshStandardMaterial({color:0x556e44,roughness:1}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
for(let r=2;r<=8;r+=2){const ring=new THREE.Mesh(new THREE.RingGeometry(r-.03,r+.03,64),
  new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:.08}));ring.rotation.x=-Math.PI/2;ring.position.y=.01;scene.add(ring);}

/* ════════ 玩家骨架（體素風格;保留 upper/armRPivot/armLPivot 介面）════════ */
const player=new THREE.Group();
// 像素紋理(Minecraft 顆粒感)
const _texCache={};
function pixelTex(hex){if(_texCache[hex])return _texCache[hex];const N=16,c=document.createElement('canvas');c.width=c.height=N;const g=c.getContext('2d');
  const base=new THREE.Color(hex);for(let y=0;y<N;y++)for(let x=0;x<N;x++){const n=(Math.sin(x*12.9+y*78.2)*43758.5)%1;const f=.82+Math.abs(n)*.32;
    const col=base.clone().multiplyScalar(f);g.fillStyle='rgb('+(col.r*255|0)+','+(col.g*255|0)+','+(col.b*255|0)+')';g.fillRect(x,y,1,1);}
  const t=new THREE.CanvasTexture(c);t.magFilter=THREE.NearestFilter;t.minFilter=THREE.NearestFilter;_texCache[hex]=t;return t;}
function vmat(hex,rough,metal){return new THREE.MeshStandardMaterial({map:pixelTex(hex),roughness:rough==null?.85:rough,metalness:metal||0});}
const skin=vmat(0x3f6fb0,.7,.1);          // 軀幹(藍上衣)
const skinFace=vmat(0xe8c39a,.85);        // 膚色
const metal=vmat(0xc6cedc,.35,.6);
const legM=vmat(0x2a3550,.8);
function box(w,h,d,m,y){const x=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);x.position.y=y;x.castShadow=true;x.receiveShadow=true;return x;}
// 雙腿(咬合式,頂端過髖)
const legR=box(.24,.78,.24,legM,.40);legR.position.x=.17;player.add(legR);
const legL=box(.24,.78,.24,legM,.40);legL.position.x=-.17;player.add(legL);
const footR=box(.26,.14,.34,vmat(0x3a2a1a),.07);footR.position.set(.17,0,.07);player.add(footR);
const footL=box(.26,.14,.34,vmat(0x3a2a1a),.07);footL.position.set(-.17,0,.07);player.add(footL);

// 上半身樞紐
const upper=new THREE.Group();upper.position.set(0,.95,0);player.add(upper);
upper.add(box(.72,.92,.42,skin,.30));                          // 軀幹
upper.add(box(.78,.16,.44,vmat(0x355f98,.7),-.08));            // 腰帶
const head=new THREE.Group();head.position.y=.7;upper.add(head);
head.add(box(.2,.2,.2,skinFace,.02));                          // 脖子
head.add(box(.46,.46,.44,skinFace,.28));                       // 頭
head.add(box(.09,.09,.02,vmat(0xf4f4f4),-.11));head.children[2].position.set(-.11,.3,.225);
head.add(box(.09,.09,.02,vmat(0xf4f4f4),0));head.children[3].position.set(.11,.3,.225);
head.add(box(.5,.14,.48,vmat(0x6b4a2a),.5));                   // 頭髮
head.add(box(.5,.24,.12,vmat(0x6b4a2a),.4));head.children[5].position.set(0,.4,-.22);

// 右臂樞紐（肩）— 與戰士同名同位,讓 swing 動作直接沿用
// 右臂二段關節(肩 armRPivot → 肘 armRElbow → 手 armRHand)
const armRPivot=new THREE.Group();armRPivot.position.set(.48,.62,0);armRPivot.rotation.x=-.3;upper.add(armRPivot);
armRPivot.add(box(.22,.5,.22,skin,-.25));                       // 上臂(肩→肘)
const armRElbow=new THREE.Group();armRElbow.position.set(0,-.5,0);armRPivot.add(armRElbow);
armRElbow.add(box(.2,.48,.2,skinFace,-.24));                    // 前臂(肘→腕)
const armRHand=new THREE.Group();armRHand.position.set(0,-.48,0);armRElbow.add(armRHand);
armRHand.add(box(.2,.18,.2,skinFace,-.05));                     // 手
// 左臂二段關節
const armLPivot=new THREE.Group();armLPivot.position.set(-.48,.62,0);armLPivot.rotation.x=-.2;upper.add(armLPivot);
armLPivot.add(box(.22,.5,.22,skin,-.25));
const armLElbow=new THREE.Group();armLElbow.position.set(0,-.5,0);armLPivot.add(armLElbow);
armLElbow.add(box(.2,.48,.2,skinFace,-.24));
const armLHand=new THREE.Group();armLHand.position.set(0,-.48,0);armLElbow.add(armLHand);
armLHand.add(box(.2,.18,.2,skinFace,-.05));

const ARM_R0=-.3;let ARM_L0=-.2;
// 雙手武器(大劍/長槍)時,左手也擺到握把處 → 雙手握姿
function setHandPose(w){
  if(w==='greatsword'){armLPivot.position.set(-.3,.55,.05);ARM_L0=-.55;}      // 左手伸向中央握把,前傾
  else if(w==='polearm'){armLPivot.position.set(-.32,.55,.05);ARM_L0=-.4;}    // 長槍雙手持桿
  else {armLPivot.position.set(-.48,.62,0);ARM_L0=-.2;}                        // 劍盾:左手持盾,回原位
  if(!window._busyFlag){armLPivot.rotation.set(ARM_L0,0,0);}
}

// 三組武器（體素化）→ 掛右臂手部
function weaponGroup(meshes){const g=new THREE.Group();meshes.forEach(m=>g.add(m));
  g.position.set(0,-.12,.05);g.userData.blade=meshes.find(m=>m.userData.blade)?.material;
  g.visible=false;armRHand.add(g);return g;}
const swBlade=box(.12,1.0,.12,metal,.5);swBlade.userData.blade=true;
const swGroup=weaponGroup([swBlade,box(.34,.12,.12,vmat(0xd8b040,.5,.5),0),box(.14,.22,.14,vmat(0x6b4a2a),-.16)]);
swGroup.rotation.x=.9;
const gsBlade=box(.2,1.5,.08,metal,.82);gsBlade.userData.blade=true;
const gsGroup=weaponGroup([gsBlade,box(.54,.14,.14,vmat(0xd8b040,.5,.5),0),box(.16,.34,.16,vmat(0x6b4a2a),-.2)]);
gsGroup.rotation.x=.7; // 大劍前傾朝前上,不貼手臂
const plShaft=box(.08,2.4,.08,vmat(0x6b4a2a,.85),.5);
const plHead=box(.16,.4,.16,metal,1.85);plHead.userData.blade=true;
const plButt=box(.1,.18,.1,metal,-.78);
const plGroup=weaponGroup([plShaft,plHead,plButt]);
plGroup.rotation.x=1.9;
const WEAPON_GROUPS={sword_shield:swGroup,greatsword:gsGroup,polearm:plGroup};

// 盾 → 左臂手部
const shield=new THREE.Mesh(new THREE.BoxGeometry(.52,.66,.1),vmat(0x8b3a3a,.5,.3));
shield.position.set(0,-.1,.18);shield.castShadow=true;shield.visible=false;armLHand.add(shield);

scene.add(player);player.position.set(0,0,0);player.rotation.y=FACING;player.userData.facing=FACING;
const playerBase=new THREE.Vector3(0,0,0);

let currentWeaponType='sword_shield',currentWeaponGroup=swGroup;
function setWeapon(w){if(!WEAPON_GROUPS[w])return;for(const k in WEAPON_GROUPS)WEAPON_GROUPS[k].visible=false;
  shield.visible=(w==='sword_shield');WEAPON_GROUPS[w].visible=true;currentWeaponType=w;currentWeaponGroup=WEAPON_GROUPS[w];
  setHandPose(w);}
setWeapon('sword_shield');

/* 假人（含 home 供重置）*/
const dummies=[];
function makeDummy(x,z){const g=new THREE.Group();
  const b=box(.6,1.4,.4,vmat(0x9a4040,.7),1);
  const h=box(.42,.42,.42,vmat(0xd0a080,.8),1.72);
  g.add(b,h);g.position.set(x,0,z);scene.add(g);
  g.userData={hitMat:[b.material,h.material],kbT:0,kbDir:new THREE.Vector3(),home:new THREE.Vector3(x,0,z)};dummies.push(g);}
makeDummy(0,-1.7);makeDummy(-1.1,-2.1);makeDummy(1.1,-2.1);makeDummy(.2,-3.4);
function resetDummies(){dummies.forEach(d=>{d.userData.kbT=0;const from=d.position.clone(),to=d.userData.home;
  let t=0;const dur=.35;addEffect({update(dt){t+=dt;const k=Math.min(t/dur,1);
    d.position.lerpVectors(from,to,k);if(t>=dur){d.position.copy(to);return false;}return true;}});});}

/* ════════ 後處理 ════════ */
const QV=`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.,1.);}`;
function fsMat(f,u){return new THREE.ShaderMaterial({uniforms:u,vertexShader:QV,fragmentShader:f,depthTest:false,depthWrite:false});}
class Post{constructor(r,w,h){this.r=r;const o={minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter};

// 每種武器的 idle 待勢(出招閒置時擺出)
const IDLE_POSE={

  sword_shield:{aRx:-.55,aRz:.15,aLx:-.45,aLz:-.1,uY:.4,uX:.02},   // 半側身,劍前指
  greatsword:{aRx:-.95,aRz:.0,aLx:-1.05,aLz:.0,uY:.6,uX:.06},      // 側身,雙手持劍架式

function applyIdle(t,fdt){const p=IDLE_POSE[currentWeaponType]||IDLE_POSE.sword_shield;

  player.rotation.y=FACING;                        // 身體永遠正面朝向(方向統一)
  armRPivot.rotation.set(p.aRx+b*.5,0,p.aRz||0);
  armLPivot.rotation.set(p.aLx-b*.5,0,p.aLz||0);

  const tuY=p.uY||0;upper.rotation.y+=(tuY-upper.rotation.y)*Math.min(1,(fdt||.016)*8);

// 肘部自然彎曲(讓手臂不僵直):依肩角給前臂一點彎
function bendElbows(){
  armRElbow.rotation.x=THREE.MathUtils.clamp(-.15-armRPivot.rotation.x*.06,-.5,.05);
  armLElbow.rotation.x=THREE.MathUtils.clamp(-.15-armLPivot.rotation.x*.06,-.5,.05);

// 雙手武器:用 2-bone IK 讓左手抓到武器握把
const TWO_HAND={greatsword:1,polearm:1};
const _gripWorld=new THREE.Vector3(),_lShoulderW=new THREE.Vector3(),_tmpQ=new THREE.Quaternion(),_tmpM=new THREE.Matrix4();
function gripLeftHand(){
  if(!TWO_HAND[currentWeaponType]||!currentWeaponGroup.visible)return;
  // 武器上一個給左手握的點(握把上方一截,雙手分握)
  const gripLocalY = currentWeaponType==='greatsword'? .15 : (currentWeaponType==='polearm'? .35 : .0);
  currentWeaponGroup.localToWorld(_gripWorld.set(0,gripLocalY,0));
  // 左肩世界座標
  armLPivot.getWorldPosition(_lShoulderW);
  // 讓左臂(肩)朝向握把:把方向轉到 armLPivot 的父空間
  const upperInv=new THREE.Matrix4().copy(upper.matrixWorld).invert();
  const targetLocal=_gripWorld.clone().applyMatrix4(upperInv);              // 握把在 upper 空間
  const shoulderLocal=armLPivot.position.clone();                            // 左肩在 upper 空間
  const dir=targetLocal.sub(shoulderLocal);                                  // 肩→握把方向
  const dist=Math.min(dir.length(),.96);                                     // 限制在手臂可及範圍
  // 手臂 rest 指向 -Y;算出讓 -Y 對齊 dir 的旋轉
  dir.normalize();
  const from=new THREE.Vector3(0,-1,0);
  _tmpQ.setFromUnitVectors(from,dir);
  armLPivot.quaternion.copy(_tmpQ);
  // 前臂依距離彎一點(越近彎越多),手才貼合
  const upperLen=.5,foreLen=.5,L=Math.max(.2,dist);
  let cos=THREE.MathUtils.clamp((upperLen*upperLen+foreLen*foreLen-L*L)/(2*upperLen*foreLen),-1,1);

}
function resetTwoHandReset(){armLPivot.rotation.set(ARM_L0,0,0);armLPivot.quaternion.setFromEuler(armLPivot.rotation);}

const TRAIL_N=16;let trailMesh=null,trailPts=[],trailActive=false;
function bladeTipBase(){const g=currentWeaponGroup;if(!g)return null;
  const blade=g.children.find(m=>m.userData.blade);if(!blade||!blade.geometry.parameters)return null;
  const hh=(blade.geometry.parameters.height||1)*.5;

function startTrail(color){trailActive=true;trailPts=[];

    geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(TRAIL_N*2*3),3));
    geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(TRAIL_N*2*3),3));
    const idx=[];for(let i=0;i<TRAIL_N-1;i++){const a=i*2,b=i*2+1,c=(i+1)*2,d=(i+1)*2+1;idx.push(a,b,c,b,d,c);}

    pos[i*6+3]=p.base.x;pos[i*6+4]=p.base.y;pos[i*6+5]=p.base.z;
    for(let j=0;j<2;j++){col[i*6+j*3]=c.r*f;col[i*6+j*3+1]=c.g*f;col[i*6+j*3+2]=c.b*f;}}

// 爆發緩動:前段慢蓄、命中段急速、之後緩衝 → 砍擊更有力
function punchEase(k){return k<.35?(k/.35)*(k/.35)*.42 : .42+ (1-Math.pow(1-(k-.35)/.65,2.4))*.58;}
function resetPose(){upper.rotation.set(0,0,0);armRPivot.rotation.set(ARM_R0,0,0);armLPivot.rotation.set(ARM_L0,0,0);

// 後搖：從揮砍末段姿勢「平滑收回」站姿（FEZ：整招打完才結束，不硬切）
function recover(dur){
  const norm=a=>Math.atan2(Math.sin(a),Math.cos(a));
  const s0={uX:upper.rotation.x,uY:norm(upper.rotation.y),uZ:upper.rotation.z,
            aRx:armRPivot.rotation.x,aRy:armRPivot.rotation.y,aRz:armRPivot.rotation.z,py:player.position.y};
  const qL0=armLPivot.quaternion.clone();const qLrest=new THREE.Quaternion().setFromEuler(new THREE.Euler(ARM_L0,0,0));
  const reRx0=armRElbow.rotation.x, leRx0=armLElbow.rotation.x;

  addEffect({update(dt){t+=dt;const k=Math.min(t/dur,1);const e=k*k*(3-2*k);
    const stanceUY=(IDLE_POSE[currentWeaponType]||IDLE_POSE.sword_shield).uY||0;
    upper.rotation.x=s0.uX*(1-e);upper.rotation.y=s0.uY+(stanceUY-s0.uY)*e;upper.rotation.z=s0.uZ*(1-e);
    armRPivot.rotation.x=s0.aRx+(ARM_R0-s0.aRx)*e;armRPivot.rotation.y=s0.aRy*(1-e);armRPivot.rotation.z=s0.aRz*(1-e);
    armLPivot.quaternion.copy(qL0).slerp(qLrest,e);
    armRElbow.rotation.x=reRx0*(1-e);armLElbow.rotation.x=leRx0*(1-e);

// 蓄力預備姿勢（windup 時擺出起手式）
function prep(style){const dur=.3;let t=0;const target={};

    case 'diag': target.aRx=1.9;target.uY=.6;break;            // 斜向起手

    case 'leap_thrust': target.uX=-.15;target.aRx=-.5;break;
    case 'slam': target.aRx=2.2;break;                         // 舉劍躍起
    case 'bash': target.aLx=.5;target.uY=.3;break;             // 盾往後拉

    armLPivot.rotation.x=s0.aLx+((target.aLx!=null?target.aLx:ARM_L0)-s0.aLx)*k;

// 出招動作
function swing(style){const dur=SW;let t=0;

  addEffect({update(dt){t+=dt;const kRaw=Math.min(t/dur,1);const k=punchEase(kRaw);const s=Math.sin(k*Math.PI);

    player.position.set(b.x+dir.x*h,b.y+y,b.z+dir.z*h);
    if(t>=dur){if(land)playerBase.addScaledVector(dir,fwd);player.position.copy(playerBase);return false;}return true;}});}

/* ════════ UI ════════ */
const tagTxt={flinch:'flinch',knockback:'擊退',stun:'暈眩'},tagCls={flinch:'tag-fl',knockback:'tag-kb',stun:'tag-stun'};
const groups={common:'g-common',sword_shield:'g-sword_shield',greatsword:'g-greatsword',polearm:'g-polearm'};
for(const id in SKILL_DEFS){const def=SKILL_DEFS[id];const p=document.getElementById(groups[def.weapon]);if(!p)continue;
  const b=document.createElement('button');b.className='btn';const hs=def.lv&&def.lv[2]&&def.lv[2].hitstun;
  b.innerHTML=`<span class="ico">${def.icon}</span><span>${def.nameZh}</span>`+
    (hs?`<span class="meta ${tagCls[hs]}">${tagTxt[hs]}</span>`:`<span class="meta">buff</span>`);
  b.onclick=()=>playSkill(id);p.appendChild(b);}
document.querySelectorAll('#lvrow button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#lvrow button').forEach(x=>x.classList.remove('on'));b.classList.add('on');curLevel=+b.dataset.lv;});
function tog(id,key){const el=document.getElementById(id);el.onclick=()=>{FX[key]=!FX[key];el.classList.toggle('on',FX[key]);};}
tog('tog-bloom','bloom');tog('tog-flip','flip');
document.getElementById('btn-reset').onclick=()=>{resetDummies();playerBase.set(0,0,0);player.position.set(0,0,0);};
document.getElementById('btn-idle').onclick=()=>{busy=false;window._busyFlag=false;_idleT=0;nowNm.textContent='待機';setPhase('IDLE','');armLPivot.rotation.set(ARM_L0,0,0);};
document.getElementById('sl-bloom').oninput=e=>post.comp.uniforms.bloomStr.value=e.target.value/100;
document.getElementById('sl-exp').oninput=e=>post.comp.uniforms.exposure.value=e.target.value/100;
let drag=false,px=0,py=0;
renderer.domElement.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;});
addEventListener('mouseup',()=>drag=false);
addEventListener('mousemove',e=>{if(!drag)return;camYaw-=(e.clientX-px)*.005;
  camPitch=THREE.MathUtils.clamp(camPitch+(e.clientY-py)*.004,.15,1.3);px=e.clientX;py=e.clientY;updateCam();});
renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();camDist=THREE.MathUtils.clamp(camDist+e.deltaY*.01,6,24);updateCam();},{passive:false});
const clock=new THREE.Clock();
let _idleT=0;
function loop(){requestAnimationFrame(loop);const dt0=Math.min(clock.getDelta(),.05);
  let dt=dt0;
  if(hitStop>0){hitStop-=dt0;dt=dt0*0.10;}
  _idleT+=dt;
  for(let i=effects.length-1;i>=0;i--)if(!effects[i].update(dt))effects.splice(i,1);
  if(!busy)applyIdle(_idleT,dt);                   // 閒置時擺武器待勢
  if(trailActive)updateTrail();
  dummies.forEach(d=>{if(d.userData.kbT>0){d.userData.kbT-=dt;d.position.addScaledVector(d.userData.kbDir,dt*6);}});
  if(shake>0){shake-=dt0;const m=shake*shake*9;const sx=(Math.random()-.5)*m,sy=(Math.random()-.5)*m;
    camera.position.x+=sx;camera.position.y+=sy;post.run(scene,camera);camera.position.x-=sx;camera.position.y-=sy;}
  else post.run(scene,camera);}
loop();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);post.resize(innerWidth,innerHeight);});
</script>
